<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Annuaire Neoedge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --border: #2a3050;
    --accent: #4f8ef7; --accent2: #7c5cfc;
    --text: #e8eaf2; --muted: #7b82a0; --red: #f7614f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 380px;
    box-shadow: 0 32px 80px rgba(0,0,0,.4);
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .logo h1 { font-size: 17px; font-weight: 600; }
  .logo p  { font-size: 11.5px; color: var(--muted); }
  h2 { font-size: 21px; font-weight: 600; margin-bottom: 6px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  label { display: block; font-size: 11px; font-weight: 600;
          text-transform: uppercase; letter-spacing: .5px;
          color: var(--muted); margin-bottom: 5px; }
  input {
    width: 100%; background: #0f1117; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 13px; color: var(--text);
    font-family: inherit; font-size: 13.5px; outline: none; margin-bottom: 16px;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,.12); }
  button {
    width: 100%; padding: 11px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: background .15s; margin-top: 4px;
  }
  button:hover { background: #3b7ef5; }
  .flash {
    background: rgba(247,97,79,.12); border: 1px solid rgba(247,97,79,.3);
    color: var(--red); border-radius: 8px; padding: 10px 13px;
    font-size: 13px; margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📒</div>
    <div>
      <h1>Annuaire Neoedge</h1>
      <p>Accès multi-utilisateurs sécurisé</p>
    </div>
  </div>
  <h2>Connexion</h2>
  <p class="sub">Entrez vos identifiants pour accéder à l'annuaire.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">
    <label for="username">Identifiant</label>
    <input type="text"     id="username" name="username" placeholder="prenom.nom" required autofocus>
    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required>
    <button type="submit">Se connecter →</button>
  </form>
</div>
</body>
</html>
